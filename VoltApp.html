<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>VOLT.</title>
<meta name="theme-color" content="#0A0F1E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VOLT."/>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
:root{
  --blue:#0057FF;
  --blue-mid:#2979FF;
  --blue-dark:#003FCC;
  --blue-soft:rgba(0,87,255,.07);
  --blue-soft2:rgba(0,87,255,.12);
  --blue-glow:rgba(0,87,255,.22);
  --ink:#0A0F1E;
  --ink2:#2D3652;
  --ink3:#6B7A99;
  --ink4:#A8B4CC;
  --bg:#F7F9FF;
  --bg2:#EDF1FB;
  --white:#FFFFFF;
  --border:rgba(0,87,255,.1);
  --border2:rgba(10,15,30,.07);
  --green:#00C47A;
  --red:#FF3B5C;
  --orange:#FF9500;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--white);color:var(--ink);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
::selection{background:var(--blue);color:#fff}
#app{height:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:82px}
.screen-full{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* FONTS */
.bc{font-family:'Barlow Condensed',sans-serif}

/* NAV BOTTOM */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid var(--border2);display:flex;z-index:100;padding:8px 0 max(16px,env(safe-area-inset-bottom))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:2px 0;transition:color .15s}
.bnav-btn .ni{font-size:22px;line-height:1}
.bnav-btn .nl{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.bnav-btn.on{color:var(--blue)}
.bnav-btn:not(.on){color:var(--ink3)}

/* INPUTS */
.lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:6px}
.inp{background:var(--bg2);border:1.5px solid transparent;border-radius:12px;padding:14px 16px;font-size:16px;font-weight:500;color:var(--ink);outline:none;width:100%;font-family:'Barlow',sans-serif;transition:all .2s}
.inp:focus{border-color:var(--blue);background:var(--white)}
.inp::placeholder{color:var(--ink4)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* BUTTONS */
.btn{width:100%;padding:15px;border:none;border-radius:50px;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:900;letter-spacing:.02em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 18px var(--blue-glow)}
.btn-blue:not(:disabled):hover{background:var(--blue-mid);transform:translateY(-2px);box-shadow:0 8px 32px var(--blue-glow)}
.btn-dark{background:var(--ink);color:#fff}
.btn-dark:hover{background:var(--ink2)}
.btn-ghost{background:var(--bg2);color:var(--ink)}
.btn-sm{padding:9px 18px;font-size:16px;width:auto;border-radius:50px}

/* CARD */
.card{background:var(--white);border-radius:20px;border:1px solid var(--border2)}

/* DARK HEADER */
.hdr{background:var(--ink);padding:16px 20px 0}
.hdr-row{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px}
.logo-txt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:#fff;letter-spacing:-.5px}

/* QR CARD */
.qr-card{background:var(--ink);border-radius:24px;margin:14px 16px 0;padding:22px 18px;position:relative;overflow:hidden}
.qr-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 85% 15%,rgba(0,87,255,.22),transparent);pointer-events:none}
.qr-inner{position:relative;z-index:1}
.qr-box{background:var(--white);border-radius:16px;padding:12px;display:inline-block}
.qr-box.blur{filter:blur(6px);pointer-events:none}
.qr-overlay{position:absolute;inset:0;border-radius:16px;background:rgba(10,15,30,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}

/* COOLDOWN BAR */
.cd-track{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin:8px 0}
.cd-fill{height:100%;border-radius:2px;transition:width 1s linear,background .5s}

/* TOGGLE */
.toggle{width:44px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-k{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* ROW ITEM */
.row-item{background:var(--white);display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:4px;cursor:pointer;border:1px solid var(--border2);transition:background .12s}
.row-item:active{background:var(--bg2)}
.row-ico{width:36px;height:36px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.row-lbl{font-size:15px;font-weight:600;flex:1;color:var(--ink)}
.row-r{font-size:13px;font-weight:600;color:var(--ink3)}
.row-chev{font-size:18px;color:var(--ink4)}
.row-danger .row-lbl{color:var(--red)}
.row-danger .row-ico{background:#FFF0F2}
.row-danger .row-chev{color:var(--red)}

/* HIST */
.hist-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border2)}
.hist-row:last-child{border-bottom:none}
.hist-ico{width:44px;height:44px;background:var(--blue-soft);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border)}

/* STAT BOX */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-box{background:var(--white);border-radius:16px;padding:14px 10px;border:1px solid var(--border2);text-align:center}
.stat-v{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--ink);line-height:1}
.stat-l{font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}

/* PLAN CARD */
.plan-card{border:1.5px solid var(--border2);border-radius:20px;padding:20px;cursor:pointer;transition:all .22s;position:relative;margin-bottom:10px;background:var(--white)}
.plan-card:hover{border-color:var(--blue);box-shadow:0 8px 28px var(--blue-glow);transform:translateY(-2px)}
.plan-card.sel{border:2px solid var(--blue);box-shadow:0 8px 28px var(--blue-glow),0 0 0 3px var(--blue-soft)}
.plan-card.feat{background:linear-gradient(145deg,var(--blue-dark),var(--blue));border-color:transparent;box-shadow:0 12px 32px var(--blue-glow)}
.plan-card.feat.sel{box-shadow:0 16px 44px rgba(0,87,255,.4),0 0 0 3px var(--blue-soft2)}

/* REFERRAL */
.ref-card{background:linear-gradient(135deg,var(--blue-dark),var(--blue));border-radius:20px;padding:22px;margin-bottom:14px}
.ref-link-box{background:rgba(255,255,255,.14);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:12px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(10,15,30,.52);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--white);border-radius:28px 28px 0 0;width:100%;max-width:430px;padding:26px 22px max(40px,env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideUp .3s ease}
.modal-pill{width:36px;height:4px;background:#E0E0DF;border-radius:2px;margin:0 auto 22px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;margin-bottom:20px;color:var(--ink)}

/* NOTIF */
#notif{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:14px;z-index:990;max-width:390px;width:calc(100% - 40px);box-shadow:0 4px 20px rgba(0,0,0,.3);display:flex;align-items:center;gap:12px;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
#notif.show{transform:translateX(-50%) translateY(0)}

/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--ink);color:#fff;border-radius:50px;padding:11px 20px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:all .3s;opacity:0;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STRIPE */
#stripe-el{background:var(--bg2);border:1.5px solid transparent;border-radius:12px;padding:14px 16px;transition:border-color .2s}
#stripe-el.StripeElement--focus{border-color:var(--blue);background:var(--white)}

/* SPINNER */
.spin{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* INSTALL BANNER */
#install-banner{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--ink);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:200;max-width:400px;width:calc(100% - 32px);box-shadow:0 4px 30px rgba(0,0,0,.25);border:1px solid var(--border);animation:fadeUp .3s ease}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<div id="notif">
  <span id="notif-icon" style="font-size:20px;flex-shrink:0"></span>
  <span id="notif-text" style="font-size:13px;font-weight:700;flex:1"></span>
  <button onclick="document.getElementById('notif').classList.remove('show')" style="background:none;border:none;color:rgba(255,255,255,.35);font-size:18px;cursor:pointer">✕</button>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const CFG = {
  API: 'https://volt-backend-final.vercel.app',
  STRIPE_KEY: 'pk_test_51TYCI6E7UUiIVPAosSnoKWduegm2VfkgBPClr1GiXoMd3fSrY20QqBywkARXcrMUwwsOjjnHSXRz7rsIvXPxFpbA00rX5t22Mr',
  DEMO_CODE: 'volt-admin-2025',
  CD_SECS: 900,
};

const PLANS = [
  { id:'month',   label:'MENSUEL',      chf:'9.90',  per:'/mois',    saving:null,             badge:null,             feat:['1 boisson / 15 min','QR code permanent','Réseau partenaires','Sans engagement'] },
  { id:'quarter', label:'TRIMESTRIEL',  chf:'24.90', per:'/3 mois',  saving:'Éco. CHF 4.80',  badge:'⭐ POPULAIRE',    feat:['1 boisson / 15 min','QR code permanent','Réseau partenaires','Renouvellement auto.'] },
  { id:'year',    label:'ANNUEL',       chf:'89.90', per:'/an',      saving:'Éco. CHF 28.90', badge:'🏆 MEILLEUR PRIX', feat:['1 boisson / 15 min','QR code permanent','Réseau partenaires','Tarif le plus bas'] },
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
window.getExpiryText = function(u) {
  if (!u || !u.subscribed) return 'NON ABONNÉ';
  let d;
  if (u.sub_expires_at) {
    d = new Date(u.sub_expires_at);
  } else {
    d = u.created_at ? new Date(u.created_at) : new Date();
    const plan = PLANS.find(p => p.id === u.plan);
    if (plan) {
      if (plan.id === 'month') d.setMonth(d.getMonth() + 1);
      else if (plan.id === 'quarter') d.setMonth(d.getMonth() + 3);
      else if (plan.id === 'year') d.setFullYear(d.getFullYear() + 1);
    }
  }
  return d.toLocaleDateString('fr-CH');
};

const PARAMS = new URLSearchParams(location.search);
const DEMO = PARAMS.get('access') === CFG.DEMO_CODE;

let S = {
  screen: 'login',
  user: null,
  token: null,
  plan: 'quarter',
  cdEnd: 0,
  history: [],
  tab: 'conn',
  cgv: false,
  payMethod: 'card',
  notifs: true,
};

const DEMO_USER = {
  id:'demo-00000001',
  name:'Alex Martin',
  email:'demo@volt.energy.ch',
  phone:'+41 79 000 00 00',
  initials:'AM',
  plan:'quarter',
  subscribed:true,
  authorized:true,
  gym:'Fitness partenaire',
  referral_code:'VOLTAM01',
  referral_count:3,
  free_months:3,
};

function loadSess() {
  try {
    const d = JSON.parse(localStorage.getItem('volt_s') || 'null');
    if (d && d.user) { S.user = d.user; S.token = d.token; S.cdEnd = d.cdEnd || 0; S.screen = 'home'; }
  } catch(e) {}
}
function saveSess() {
  localStorage.setItem('volt_s', JSON.stringify({ user:S.user, token:S.token, cdEnd:S.cdEnd }));
}
function doLogout() {
  localStorage.removeItem('volt_s');
  S = { screen:'login', user:null, token:null, plan:'quarter', cdEnd:0, history:[], tab:'conn', cgv:false, payMethod:'card' };
  render();
}

window.confirmDeleteAccount = function() {
  openModal('Supprimer mon compte',
    '<div style="display:flex;flex-direction:column;gap:14px">'
    + '<div style="text-align:center;font-size:40px;margin-bottom:4px">⚠️</div>'
    + '<div style="font-size:15px;font-weight:600;color:var(--ink);text-align:center;line-height:1.6">Cette action est <strong>irréversible</strong>.<br/>Ton compte, tes données et ton abonnement seront définitivement supprimés.</div>'
    + '<div style="background:#FFF0F2;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:600;color:var(--red);text-align:center">⚠ Tu perdras immédiatement accès à VOLT.</div>'
    + '<button class="btn" style="background:var(--red);color:#fff;font-family:\'Barlow Condensed\',sans-serif;font-size:19px;font-weight:900" onclick="doDeleteAccount()">OUI, SUPPRIMER MON COMPTE</button>'
    + '<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>'
    + '</div>'
  );
};

window.doDeleteAccount = async function() {
  closeModal();
  const res = await api('/api/user-update', {}, 'DELETE');
  if (res && res.error) { toast(res.error, false); return; }
  toast('Compte supprimé. À bientôt 👋');
  setTimeout(() => {
    localStorage.removeItem('volt_s');
    S = { screen:'login', user:null, token:null, plan:'quarter', cdEnd:0, history:[], tab:'conn', cgv:false, payMethod:'card' };
    render();
  }, 1500);
};

// ═══════════════════════════════════════════
//  API
// ═══════════════════════════════════════════
async function api(path, body, method) {
  if (DEMO) return demoApi(path, body);
  try {
    const r = await fetch(CFG.API + path, {
      method: method || (body ? 'POST' : 'GET'),
      headers: { 'Content-Type':'application/json', 'Authorization': S.token ? 'Bearer '+S.token : '' },
      body: body ? JSON.stringify(body) : undefined,
    });
    return r.json();
  } catch(e) { return { error:'Connexion impossible.' }; }
}

function demoApi(path, body) {
  if (path === '/api/login') {
    if ((body.email||'').toLowerCase() === 'demo@volt.energy.ch')
      return { user: DEMO_USER, token: 'demo-tok' };
    return { error: 'Email ou mot de passe incorrect.' };
  }
  if (path === '/api/register') return { user: Object.assign({}, DEMO_USER, { name:(body.firstName+' '+body.lastName).trim(), email:body.email, subscribed:false }), token:'demo-tok2' };
  if (path === '/api/pay-intent') return { ok:true, demo:true };
  if (path === '/api/history') return { history:[] };
  return { ok:true };
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function cdLeft() { return Math.max(0, Math.ceil(S.cdEnd - Date.now()/1000)); }
function fmtCd(s) { return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }

function toast(msg, good) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = good===false ? '#FF3B5C' : '#050A14';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function notif(icon, text) {
  document.getElementById('notif-icon').textContent = icon;
  document.getElementById('notif-text').textContent = text;
  const el = document.getElementById('notif');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function nav(to) { S.screen = to; render(); }

function initials(name) {
  return (name||'').split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase() || 'VU';
}

async function shareRef() {
  const code = S.user.referral_code || S.user.id.slice(0,8).toUpperCase();
  const link = 'https://volt.energy.ch/join?ref=' + code;
  if (navigator.share) { await navigator.share({ title:'VOLT. — Rejoins-moi !', url:link }); }
  else { try { await navigator.clipboard.writeText(link); toast('Lien copié ! ✓'); } catch(e) { toast(link); } }
}

let cdTick = null;
function startCdTick() {
  clearInterval(cdTick);
  cdTick = setInterval(() => {
    const rem = cdLeft();
    const tEl = document.getElementById('cd-time');
    const fEl = document.getElementById('cd-fill');
    const sEl = document.getElementById('cd-sub');
    const col = rem < 60 ? '#FF3B5C' : rem < 180 ? '#FF9500' : '#0057FF';
    if (tEl) { tEl.textContent = fmtCd(rem); tEl.style.color = col; }
    if (fEl) { fEl.style.width = (rem/CFG.CD_SECS*100)+'%'; fEl.style.background = col; }
    if (sEl) { sEl.textContent = fmtCd(rem); }
    if (rem === 0) { clearInterval(cdTick); notif('⚡','Ton prochain scan est disponible !'); render(); }
  }, 1000);
}

// ═══════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════
function render() {
  clearInterval(cdTick);
  const app = document.getElementById('app');
  if (!S.user) { app.innerHTML = renderLogin(); bindLogin(); return; }
  const navHtml = renderNav();
  if (S.screen === 'home') { app.innerHTML = renderHome() + navHtml; bindHome(); }
  else if (S.screen === 'pay') { app.innerHTML = renderPay() + navHtml; bindPay(); }
  else if (S.screen === 'hist') { app.innerHTML = renderHist() + navHtml; }
  else if (S.screen === 'acc') { app.innerHTML = renderAcc() + navHtml; bindAcc(); }
  else if (S.screen === 'manage') { app.innerHTML = renderManage(); }
}

function renderNav() {
  const tabs = [
    { id:'home', icon:'⚡', label:'Mon QR' },
    { id:'pay',  icon:'💳', label:'Abo.' },
    { id:'hist', icon:'📊', label:'Historique' },
    { id:'acc',  icon:'👤', label:'Compte' },
  ];
  return '<nav class="bnav">' + tabs.map(t =>
    '<button class="bnav-btn '+(S.screen===t.id?'on':'')+'" onclick="nav(\''+t.id+'\')">'
    + '<span class="ni">'+t.icon+'</span>'
    + '<span class="nl">'+t.label+'</span>'
    + '</button>'
  ).join('') + '</nav>';
}

// ═══════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════
function renderLogin() {
  const isConn = S.tab === 'conn';
  return '<div class="screen-full" style="background:var(--ink);display:flex;flex-direction:column;min-height:100%">'
    + '<div style="position:relative;overflow:hidden;flex:1;display:flex;flex-direction:column">'
    + '<div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 80% 0%,rgba(0,87,255,.28),transparent 70%);pointer-events:none"></div>'
    + '<div style="padding:56px 28px 28px;position:relative;animation:fadeUp .7s ease both">'
    + '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:76px;color:#fff;letter-spacing:-2px;line-height:.9">VOLT<span style="color:#fff">.</span></div>'
    + '<div style="font-size:14px;font-weight:500;color:rgba(255,255,255,.38);margin-top:10px">L\'énergie illimitée dans ton fitness</div>'
    + '</div>'
    + '<div style="background:var(--white);border-radius:28px 28px 0 0;padding:26px 22px max(40px,env(safe-area-inset-bottom));margin-top:auto">'
    + '<div style="display:flex;background:var(--bg2);border-radius:12px;padding:3px;gap:3px;margin-bottom:22px">'
    + '<button id="tab-conn" onclick="setTab(\'conn\')" class="'+tabStyle('conn')+'">Connexion</button>'
    + '<button id="tab-inscr" onclick="setTab(\'inscr\')" class="'+tabStyle('inscr')+'">Inscription</button>'
    + '</div>'
    + '<div id="tab-body">' + renderTabBody() + '</div>'

function bindLogin() {
  const btnL = document.getElementById('btn-login');
  if (btnL) btnL.onclick = doLogin;
  const btnR = document.getElementById('btn-register');
  if (btnR) btnR.onclick = doRegister;
  const lEmail = document.getElementById('l-email');
  const lPwd = document.getElementById('l-pwd');
  if (lEmail && lPwd) {
    [lEmail, lPwd].forEach(el => el.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); }));
  }
}

async function doLogin() {
  const email = (document.getElementById('l-email')||{}).value || '';
  const pwd   = (document.getElementById('l-pwd')||{}).value || '';
  if (!email || !pwd) { toast('Remplis tous les champs.', false); return; }
  const btn = document.getElementById('btn-login');
  if (btn) { btn.innerHTML = '<div class="spin"></div>'; btn.disabled = true; }
  const res = await api('/api/login', { email, password: pwd });
  if (res.error) { toast(res.error, false); if (btn) { btn.innerHTML='Se connecter →'; btn.disabled=false; } return; }
  S.user = res.user; S.token = res.token; saveSess();
  S.screen = 'home'; render();
}

async function doRegister() {
  if (!S.cgv) { toast('Accepte les CGV pour continuer.', false); return; }
  const fn    = (document.getElementById('r-fn')||{}).value||'';
  const ln    = (document.getElementById('r-ln')||{}).value||'';
  const email = (document.getElementById('r-email')||{}).value||'';
  const phone = (document.getElementById('r-phone')||{}).value||'';
  const pwd   = (document.getElementById('r-pwd')||{}).value||'';
  if (!fn||!ln||!email||!pwd) { toast('Remplis tous les champs.', false); return; }
  if (pwd.length < 8) { toast('Mot de passe minimum 8 caractères.', false); return; }
  const btn = document.getElementById('btn-register');
  if (btn) { btn.innerHTML = '<div class="spin"></div>'; btn.disabled = true; }
  const res = await api('/api/register', { firstName:fn, lastName:ln, email, phone, password:pwd });
  if (res.error) { toast(res.error, false); if (btn) { btn.innerHTML='Créer mon compte ⚡'; btn.disabled=false; } return; }
  S.user = res.user; S.token = res.token; saveSess();
  S.screen = 'pay'; render();
}

window.cancelSub = async function() {
  if(!confirm("Es-tu sûr(e) de vouloir annuler ton abonnement ?\n\nTu garderas l'accès aux machines VOLT jusqu'à la date de fin prévue, mais il ne sera plus renouvelé automatiquement.")) return;
  const btn = document.querySelector('button[onclick="cancelSub()"]');
  if(btn) { btn.innerHTML = '<div class="spin"></div>'; btn.disabled = true; }
  
  const res = await api('/api/cancel-sub', {});
  
  if (res.error) {
    toast("Erreur : " + res.error);
    if(btn) { btn.innerHTML = 'Annuler le renouvellement auto.'; btn.disabled = false; }
  } else {
    toast('✅ Renouvellement automatique annulé.');
    S.user.cancel_at_period_end = true;
    saveSess();
    render();
  }
};

let stripeInst = null, stripeCard = null;
function bindPay() {
  if (S.payMethod === 'card') {
    // Attendre que la clé soit disponible puis initialiser
    waitForStripeKey();
  }
  const btnPay = document.getElementById('btn-pay');
  if (btnPay) btnPay.onclick = doPay;
  const btnTw = document.getElementById('btn-twint');
  if (btnTw) btnTw.onclick = doTwint;
}

function waitForStripeKey(attempts) {
  attempts = attempts || 0;
  if (attempts > 20) return; // abandon après 4 secondes
  if (!CFG.STRIPE_KEY || CFG.STRIPE_KEY === '') {
    setTimeout(() => waitForStripeKey(attempts + 1), 200);
    return;
  }
  initStripe();
}

function initStripe() {
  if (!window.Stripe || !CFG.STRIPE_KEY) return;
  try {
    stripeInst = Stripe(CFG.STRIPE_KEY);
    const els = stripeInst.elements({ locale: 'fr' });
    const style = {
      base: {
        fontSize: '16px',
        color: '#0A0F1E',
        fontFamily: '"Barlow", sans-serif',
        '::placeholder': { color: '#A8B4CC' }
      }
    };
    // Élément unique qui gère carte + expiration + CVV
    stripeCard = els.create('card', {
      style,
      hidePostalCode: true
    });
    stripeCard.mount('#stripe-el');
    stripeCard.on('focus', () => {
      const el = document.getElementById('stripe-el');
      if (el) { el.style.borderColor = 'var(--blue)'; el.style.background = 'var(--white)'; }
    });
    stripeCard.on('blur', () => {
      const el = document.getElementById('stripe-el');
      if (el) { el.style.borderColor = 'transparent'; el.style.background = 'var(--bg2)'; }
    });
  } catch(e) {
    console.error('Stripe init error:', e);
  }
}

async function doPay() {
  const btn = document.getElementById('btn-pay');
  if (!btn) return;
  btn.innerHTML = '<div class="spin"></div>'; btn.disabled = true;
  const plan = PLANS.find(p=>p.id===S.plan);

  // Mode démo
  if (DEMO) {
    S.user.subscribed = true; S.user.plan = S.plan; saveSess();
    toast('✅ Abonnement activé !'); notif('✅','Abonnement activé ! Ton QR est prêt.');
    S.screen = 'home'; render(); return;
  }

  // 1. Créer le SetupIntent (enregistre la carte)
  const res = await api('/api/pay-intent', { plan_id: plan.id });
  if (res.error) {
    showPayErr(res.error);
    btn.innerHTML = 'PAYER CHF '+plan.chf+' →'; btn.disabled = false; return;
  }

  try {
    // 2. Confirmer l'enregistrement de la carte
    const { setupIntent, error } = await stripeInst.confirmCardSetup(res.client_secret, {
      payment_method: {
        card: stripeCard,
        billing_details: { email: S.user.email, name: S.user.name }
      }
    });

    if (error) {
      showPayErr(error.message);
      btn.innerHTML = 'PAYER CHF '+plan.chf+' →'; btn.disabled = false; return;
    }

    // 3. Créer l'abonnement avec la carte enregistrée
    const confirm = await api('/api/pay-confirm', {
      setup_intent_id:   setupIntent.id,
      payment_method_id: setupIntent.payment_method,
      plan_id:           S.plan,
      customer_id:       res.customer_id,
      price_id:          res.price_id,
    });

    if (confirm.error) {
      showPayErr(confirm.error);
      btn.innerHTML = 'PAYER CHF '+plan.chf+' →'; btn.disabled = false; return;
    }

    S.user.subscribed = true; S.user.plan = S.plan; saveSess();
    toast('✅ Abonnement activé ! Renouvellement automatique.');
    notif('✅','Abonnement activé ! Ton QR est prêt.');
    S.screen = 'home'; render();

  } catch(e) {
    console.error('doPay error:', e);
    showPayErr('Erreur: ' + (e.message || JSON.stringify(e)));
    btn.innerHTML = 'PAYER CHF '+plan.chf+' →'; btn.disabled = false;
  }
}

function showPayErr(msg) {
  const el = document.getElementById('pay-err');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

async function doTwint() {
  const btn = document.getElementById('btn-twint');
  if (btn) { btn.innerHTML = '<div class="spin"></div>'; btn.disabled = true; }
  const plan = PLANS.find(p=>p.id===S.plan);
  const res = await api('/api/pay/twint', { plan_id: plan.id });
  if (DEMO || res.demo) {
    S.user.subscribed = true; S.user.plan = S.plan; saveSess();
    toast('✅ Abonnement activé (TWINT) !'); S.screen = 'home'; render(); return;
  }
  if (res.redirect_url) { window.location.href = res.redirect_url; return; }
  if (btn) { btn.innerHTML = 'PAYER AVEC TWINT →'; btn.disabled = false; }
  toast('Redirection TWINT...', true);
}

window.saveProfile = async function() {

  const email = (document.getElementById('ep-email')||{}).value||'';
  const phone = (document.getElementById('ep-phone')||{}).value||'';
  S.user.name  = (fn+' '+ln).trim();
  S.user.email = email;
  S.user.phone = phone;
  S.user.initials = initials(S.user.name);
  await api('/api/user-update', { firstName:fn, lastName:ln, email, phone });
  saveSess(); closeModal(); toast('Profil mis à jour ✓');
  document.getElementById('app').innerHTML = renderAcc() + renderNav();
  bindAcc();

window.openModal = function(title, content) {
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'modal-bg'; bg.id = 'modal-bg';
  bg.innerHTML = '<div class="modal"><div class="modal-pill"></div><div class="modal-title">'+title+'</div>'+content+'</div>';
  bg.onclick = e => { if (e.target === bg) closeModal(); };
  document.body.appendChild(bg);
};

window.closeModal = function() {

};

let dip = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); dip = e;
  if (!sessionStorage.getItem('volt-noinst') && !window.navigator.standalone && !window.matchMedia('(display-mode: standalone)').matches) {
    setTimeout(showInstall, 1500);
  }
});

function showInstall() {
  if (document.getElementById('install-banner')) return;
  const b = document.createElement('div');
  b.id = 'install-banner';
  b.innerHTML = '<div style="width:44px;height:44px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">⚡</div>'
    +'<div style="flex:1"><div class="bc" style="font-weight:800;font-size:16px;color:#fff">INSTALLER VOLT.</div><div style="font-size:12px;color:rgba(255,255,255,.45);margin-top:1px">Accès direct depuis l\'écran d\'accueil</div></div>'
    +'<button onclick="doInstall()" style="background:var(--blue);border:none;border-radius:50px;padding:8px 14px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;white-space:nowrap">Installer</button>'
    +'<button onclick="this.closest(\'#install-banner\').remove();sessionStorage.setItem(\'volt-noinst\',\'1\')" style="background:none;border:none;color:rgba(255,255,255,.3);font-size:20px;cursor:pointer;padding:4px">✕</button>';
  document.body.appendChild(b);
}

window.doInstall = async function() {
  if (!dip) return;
  dip.prompt();
  const { outcome } = await dip.userChoice;
  dip = null;
  const b = document.getElementById('install-banner');
  if (b) b.remove();
};

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
